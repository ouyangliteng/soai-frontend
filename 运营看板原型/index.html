<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOAI 运营数据看板</title>
    <meta name="description" content="SOAI 马术 AI 训练系统内测运营数据看板" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="#">
        <span>S</span>
        <strong>SOAI</strong>
      </a>
      <nav>
        <a class="active" href="#overview">运营总览</a>
        <a href="#daily-report">内测日报</a>
        <a href="#funnel">转化漏斗</a>
        <a href="#channels">渠道表现</a>
        <a href="#feedback">反馈质量</a>
        <a href="#content">内容队列</a>
        <a href="#risks">风险预警</a>
      </nav>
      <div class="sidebar-note">
        <b>内测目标</b>
        <span>验证上传、报告、复核、二次上传与产品咨询闭环。</span>
      </div>
    </aside>

    <main>
      <header class="topbar">
        <div>
          <p class="caption">V0.2 内测 / V0.3 教练端准备</p>
          <h1>SOAI 运营数据看板</h1>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" type="button">刷新数据</button>
          <span id="dataSource">连接中</span>
        </div>
      </header>

      <section id="overview" class="kpi-grid" aria-label="核心指标"></section>

      <section id="daily-report" class="panel daily-report-panel">
        <div class="panel-head">
          <div>
            <p class="caption">内测日报</p>
            <h2>今日结论与明日动作</h2>
          </div>
          <button id="copyDailyReport" class="panel-button" type="button">复制日报</button>
        </div>
        <div id="dailyReport" class="daily-report"></div>
      </section>

      <section class="layout-grid">
        <article id="funnel" class="panel panel-large">
          <div class="panel-head">
            <div>
              <p class="caption">转化路径</p>
              <h2>内容到产品咨询漏斗</h2>
            </div>
            <span class="panel-tag">每日观察</span>
          </div>
          <div id="funnelChart" class="funnel"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="caption">训练链路</p>
              <h2>7 日活跃趋势</h2>
            </div>
          </div>
          <div id="dailySeries" class="bars"></div>
        </article>
      </section>

      <section id="channels" class="panel">
        <div class="panel-head">
          <div>
            <p class="caption">渠道运营</p>
            <h2>小红书、抖音、视频号、微信群、天猫</h2>
          </div>
          <span class="panel-tag">负责人每日更新</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>渠道</th>
                <th>角色</th>
                <th>曝光</th>
                <th>线索</th>
                <th>下一步动作</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="channelRows"></tbody>
          </table>
        </div>
      </section>

      <section id="feedback" class="panel">
        <div class="panel-head">
          <div>
            <p class="caption">反馈质量</p>
            <h2>学员和教练反馈闭环</h2>
          </div>
          <span class="panel-tag">每日复盘</span>
        </div>
        <div id="feedbackSummary" class="feedback-grid"></div>
      </section>

      <section class="layout-grid">
        <article id="content" class="panel">
          <div class="panel-head">
            <div>
              <p class="caption">内容队列</p>
              <h2>本周发布与审核</h2>
            </div>
          </div>
          <div id="contentQueue" class="queue"></div>
        </article>

        <article id="risks" class="panel">
          <div class="panel-head">
            <div>
              <p class="caption">风险控制</p>
              <h2>上线前必须守住的边界</h2>
            </div>
          </div>
          <div id="riskList" class="risks"></div>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
