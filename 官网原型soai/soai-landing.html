<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOAI — 你踩上马镫的那一刻</title>
  <link rel="stylesheet" href="soai-landing.css" />
</head>
<body>
  <canvas id="particles" aria-hidden="true"></canvas>

  <!-- S01: 全屏开场 -->
  <section id="s01" class="section s01">
    <div class="s01-content">
      <div class="s01-eyebrow">SOAI Training System</div>
      <h1 class="s01-title">
        <span class="s01-line1">你踩上马镫</span>
        <span class="s01-line2">的那一刻</span>
      </h1>
      <p class="s01-sub">SOAI 已经开始记录</p>
    </div>
    <div class="s01-hero-img">
      <img src="assets/hero-equestrian-training.png" alt="马术骑手" />
    </div>
    <div class="s01-scroll-hint" aria-label="向下探索">
      <span class="s01-scroll-arrow">↓</span>
      <span class="s01-scroll-text">向下探索</span>
    </div>
  </section>

  <!-- S02: 滚动骨骼揭示 -->
  <section id="s02" class="section s02">
    <div class="s02-inner">
      <div class="s02-left">
        <p class="s02-phase" id="s02-phase">AI 正在扫描你的姿态</p>
      </div>
      <div class="s02-center">
        <svg
          id="skeleton-svg"
          viewBox="0 0 260 320"
          aria-label="骑手 AI 姿态识别图"
          role="img"
        >
          <defs>
            <linearGradient id="spineGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#00c8ff"/>
              <stop offset="100%" stop-color="#6496ff"/>
            </linearGradient>
            <linearGradient id="legGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#a855f7"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>

          <!-- 检测边框 -->
          <rect class="detect-box" x="18" y="8" width="224" height="302" rx="4"
            fill="none" stroke="rgba(0,200,255,0.25)" stroke-width="1"
            stroke-dasharray="6 4"/>
          <!-- 角标 -->
          <polyline class="detect-corner" points="18,28 18,8 38,8"   fill="none" stroke="#00c8ff" stroke-width="2"/>
          <polyline class="detect-corner" points="222,8 242,8 242,28"  fill="none" stroke="#00c8ff" stroke-width="2"/>
          <polyline class="detect-corner" points="18,292 18,310 38,310" fill="none" stroke="#a855f7" stroke-width="2"/>
          <polyline class="detect-corner" points="222,310 242,310 242,292" fill="none" stroke="#a855f7" stroke-width="2"/>

          <!-- 置信度标签 -->
          <g class="confidence-label">
            <rect x="18" y="8" width="110" height="18" rx="2" fill="rgba(0,200,255,0.12)"/>
            <text x="26" y="21" font-size="9" fill="#00c8ff" font-family="monospace" letter-spacing="1">POSE · 94.7%</text>
          </g>

          <!-- 骨骼路径（保持 .bone-group IDs 供 JS 动画驱动） -->
          <g id="bones" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <!-- 脊柱 (0–20%) -->
            <g class="bone-group" id="bg-spine" stroke="url(#spineGrad)" stroke-width="3">
              <line class="bone" x1="130" y1="52" x2="128" y2="75"/>
              <line class="bone" x1="128" y1="75" x2="126" y2="150"/>
            </g>
            <!-- 头部 (20–30%) -->
            <g class="bone-group" id="bg-head" stroke="#00c8ff" stroke-width="2.5">
              <circle class="bone" cx="130" cy="32" r="22" fill="none"/>
              <line class="bone" x1="130" y1="52" x2="130" y2="42"/>
            </g>
            <!-- 肩臂 (30–50%) -->
            <g class="bone-group" id="bg-arms" stroke="#00e5cc" stroke-width="3">
              <line class="bone" x1="75"  y1="88"  x2="185" y2="88"/>
              <line class="bone" x1="75"  y1="88"  x2="55"  y2="150"/>
              <line class="bone" x1="185" y1="88"  x2="205" y2="150"/>
              <line class="bone" x1="55"  y1="150" x2="50"  y2="188"/>
              <line class="bone" x1="205" y1="150" x2="210" y2="188"/>
            </g>
            <!-- 髋腿 (50–80%) -->
            <g class="bone-group" id="bg-legs" stroke="url(#legGrad)" stroke-width="3">
              <line class="bone" x1="126" y1="150" x2="95"  y2="162"/>
              <line class="bone" x1="126" y1="150" x2="157" y2="162"/>
              <line class="bone" x1="95"  y1="162" x2="72"  y2="210"/>
              <line class="bone" x1="157" y1="162" x2="180" y2="210"/>
            </g>
            <!-- 脚踝 (80–100%) -->
            <g class="bone-group" id="bg-ankles" stroke="url(#legGrad)" stroke-width="2.5">
              <line class="bone" x1="72"  y1="210" x2="76"  y2="268"/>
              <line class="bone" x1="180" y1="210" x2="176" y2="268"/>
            </g>
          </g>

          <!-- 关节点（大圆 MediaPipe 风格，初始隐藏） -->
          <g id="joints" opacity="0">
            <!-- 头颈 -->
            <circle class="joint joint--spine" id="j-head"   cx="130" cy="32"  r="8" data-name="头部"   data-val="前倾 8°"   data-tip="保持头部自然中立，视线水平向前" data-conf="96.2"/>
            <circle class="joint joint--spine" id="j-neck"   cx="128" cy="70"  r="7" data-name="颈椎"   data-val="对齐良好"  data-tip="颈部放松，避免紧缩" data-conf="95.1"/>
            <!-- 肩 -->
            <circle class="joint joint--arm"   id="j-lsho"   cx="75"  cy="88"  r="8" data-name="左肩"   data-val="外旋 6°"   data-tip="肩部下沉，减少外旋幅度" data-conf="93.4"/>
            <circle class="joint joint--arm"   id="j-rsho"   cx="185" cy="88"  r="8" data-name="右肩"   data-val="对称良好"  data-tip="保持双肩水平，当前状态良好" data-conf="94.7"/>
            <!-- 肘 -->
            <circle class="joint joint--arm"   id="j-lelbow" cx="55"  cy="150" r="8" data-name="左肘"   data-val="弯曲 95°"  data-tip="肘部保持自然弯曲，轻持缰绳" data-conf="91.3"/>
            <circle class="joint joint--arm"   id="j-relbow" cx="205" cy="150" r="8" data-name="右肘"   data-val="弯曲 92°"  data-tip="右肘略需放松，与左侧保持对称" data-conf="90.8"/>
            <!-- 腕 -->
            <circle class="joint joint--arm"   id="j-lwrist" cx="50"  cy="188" r="6" data-name="左腕"   data-val="握缰稳定"  data-tip="握缰力度均匀，保持放松" data-conf="88.5"/>
            <circle class="joint joint--arm"   id="j-rwrist" cx="210" cy="188" r="6" data-name="右腕"   data-val="握缰稳定"  data-tip="右腕略有紧张，尝试放松手指" data-conf="87.9"/>
            <!-- 髋 -->
            <circle class="joint joint--spine" id="j-hip"    cx="126" cy="150" r="9" data-name="髋部"   data-val="稳定 87%"  data-tip="髋部稳定性良好，继续保持深坐" data-conf="97.1"/>
            <circle class="joint joint--leg"   id="j-lhip"   cx="95"  cy="162" r="7" data-name="左髋"   data-val="内旋 3°"   data-tip="左髋关节轻微内旋，注意放松" data-conf="92.6"/>
            <circle class="joint joint--leg"   id="j-rhip"   cx="157" cy="162" r="7" data-name="右髋"   data-val="对称良好"  data-tip="右髋位置正确" data-conf="93.0"/>
            <!-- 膝 -->
            <circle class="joint joint--leg"   id="j-lknee"  cx="72"  cy="210" r="8" data-name="左膝"   data-val="内扣 4°"   data-tip="左膝微有内扣，注意放松大腿内侧" data-conf="89.4"/>
            <circle class="joint joint--leg"   id="j-rknee"  cx="180" cy="210" r="8" data-name="右膝"   data-val="对称良好"  data-tip="右膝位置正确，踩镫力度均匀" data-conf="91.2"/>
            <!-- 踝 -->
            <circle class="joint joint--leg"   id="j-lankle" cx="76"  cy="268" r="7" data-name="左踝"   data-val="踩镫 −2°"  data-tip="脚跟稍向下压，增加踩镫稳定性" data-conf="86.3"/>
            <circle class="joint joint--leg"   id="j-rankle" cx="176" cy="268" r="7" data-name="右踝"   data-val="踩镫良好"  data-tip="右踝角度正确，保持当前状态" data-conf="87.8"/>
          </g>

          <!-- 关节置信度标签（骨骼完成后显示） -->
          <g id="conf-labels" opacity="0" font-size="7" font-family="monospace" fill="rgba(255,255,255,0.5)">
            <text x="142" y="35"  >96%</text>
            <text x="142" y="152" >97%</text>
            <text x="56"  y="84"  >93%</text>
            <text x="192" y="84"  >95%</text>
            <text x="20"  y="153" >91%</text>
            <text x="212" y="153" >91%</text>
            <text x="50"  y="206" >89%</text>
            <text x="185" y="206" >91%</text>
          </g>
        </svg>

        <!-- 数据标签 -->
        <div class="data-labels" aria-label="骑手姿态数据">
          <div class="data-tag data-tag--blue"  id="dt-spine" >● 背部角度 ── 12.4°</div>
          <div class="data-tag data-tag--green" id="dt-hip"   >● 髋部稳定 ── 87%</div>
          <div class="data-tag data-tag--red"   id="dt-center">● 重心偏移 ── −2.8cm</div>
          <div class="data-tag data-tag--blue"  id="dt-ankle" >● 踩镫压力 ── 均匀</div>
        </div>
      </div>
      <div class="s02-right">
        <div class="s02-scan-line"></div>
      </div>
    </div>

    <!-- Tooltip 浮层 -->
    <div id="tooltip" class="tooltip" role="tooltip" aria-live="polite">
      <div class="tooltip-name"></div>
      <div class="tooltip-val"></div>
      <div class="tooltip-conf"></div>
      <div class="tooltip-tip"></div>
      <button class="tooltip-close" aria-label="关闭">×</button>
    </div>
  </section>

  <!-- S03: 进步对比 -->
  <section id="s03" class="section s03">
    <div class="s03-inner">
      <div class="s03-left">
        <div class="s03-eyebrow">三周后的你</div>
        <h2 class="s03-title">数据不会说谎</h2>
        <svg id="progress-chart" viewBox="0 0 340 200" role="img" aria-label="训练进步折线图">
          <!-- 网格辅助线 -->
          <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
            <line x1="0" y1="50"  x2="340" y2="50"  />
            <line x1="0" y1="100" x2="340" y2="100" />
            <line x1="0" y1="150" x2="340" y2="150" />
          </g>
          <!-- 训练前（暗色平缓） -->
          <path
            id="line-before"
            d="M 10,155 C 60,152 100,150 150,148 C 200,146 260,145 330,143"
            fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"
          />
          <!-- 使用 SOAI 后（渐变上扬） -->
          <path
            id="line-after"
            d="M 10,155 C 40,148 70,138 110,118 C 150,98 200,70 250,48 C 280,34 310,28 330,24"
            fill="none" stroke="url(#lineGrad)" stroke-width="2.5"
          />
          <defs>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%"   stop-color="#00c8ff" />
              <stop offset="100%" stop-color="#a855f7" />
            </linearGradient>
          </defs>
          <!-- 图例 -->
          <g font-size="10" fill="rgba(255,255,255,0.4)">
            <line x1="10" y1="182" x2="30" y2="182" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
            <text x="36" y="186">使用前</text>
            <line x1="90" y1="182" x2="110" y2="182" stroke="url(#lineGrad)" stroke-width="2"/>
            <text x="116" y="186" fill="rgba(255,255,255,0.6)">使用 SOAI 后</text>
          </g>
        </svg>
      </div>
      <div class="s03-right">
        <div class="stat-card">
          <div class="stat-num" data-target="87" data-suffix="%">0%</div>
          <div class="stat-label">姿态稳定性提升</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" data-target="3" data-suffix="周">0周</div>
          <div class="stat-label">平均见效周期</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" data-target="12" data-suffix="°">0°</div>
          <div class="stat-label">背部角度优化</div>
        </div>
      </div>
    </div>
  </section>

  <!-- S04: CTA -->
  <section id="s04" class="section s04">
    <div class="s04-glow"></div>
    <div class="s04-content">
      <div class="s04-eyebrow">开始你的训练</div>
      <h2 class="s04-title">成为更好的骑手</h2>
      <p class="s04-sub">预约演示，亲身体验 AI 姿态分析</p>
      <div class="s04-actions">
        <a class="btn btn--primary" href="#s01">预约演示 →</a>
        <a class="btn btn--ghost" href="#s03">了解更多</a>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="soai-landing.js"></script>
</body>
</html>
