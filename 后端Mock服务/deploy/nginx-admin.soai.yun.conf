server {
    listen 80;
    server_name admin.soai.yun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.soai.yun;

    # 在宝塔或阿里云证书面板中替换为实际证书路径。
    ssl_certificate /www/server/panel/vhost/cert/admin.soai.yun/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/admin.soai.yun/privkey.pem;

    root /www/wwwroot/soai-frontend/后台管理MVP;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
