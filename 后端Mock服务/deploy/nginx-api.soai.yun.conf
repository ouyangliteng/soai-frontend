server {
    listen 80;
    server_name api.soai.yun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.soai.yun;

    # 在宝塔或腾讯云证书面板中替换为实际证书路径。
    ssl_certificate /www/server/panel/vhost/cert/api.soai.yun/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/api.soai.yun/privkey.pem;

    client_max_body_size 180m;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;

    location /storage/ {
        alias /data/soai-storage/;
        expires 7d;
        add_header Cache-Control "private";
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }
}
